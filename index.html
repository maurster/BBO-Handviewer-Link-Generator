<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BBO Handviewer Link Generator</title>

  <!-- Tailwind (for the className styles used in the TSX) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React 18 (UMD) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel (so we can run JSX in one file) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* Small safety net so the app doesn't look broken if Tailwind fails to load */
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji"; }
  </style>
</head>
<body class="bg-gray-50">
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
// Function to extract actual card codes from a trick string, ignoring annotations
  const extractCardCodes = (trickString) => {
    const cardCodes = [];
    let i = 0;
    
    // Process the string character by character
    while (i < trickString.length) {
      // If we have a suit code and a rank code
      if (i + 1 < trickString.length) {
        const possibleSuit = trickString[i];
        const possibleRank = trickString[i+1];
        
        // Check if this is a valid suit code (s, h, d, c)
        if (['s', 'h', 'd', 'c'].includes(possibleSuit)) {
          // Check if this is a valid rank code (a, k, q, j, t, 9-2)
          if (['a', 'k', 'q', 'j', 't', '9', '8', '7', '6', '5', '4', '3', '2'].includes(possibleRank.toLowerCase())) {
            // This is a valid card code (e.g., "sa" for Ace of Spades)
            cardCodes.push(possibleSuit + possibleRank);
            i += 2; // Move past the card code
            
            // Skip any annotation that might follow
            if (i < trickString.length && trickString[i] === '{') {
              while (i < trickString.length && trickString[i] !== '}') {
                i++;
              }
              if (i < trickString.length) i++; // Move past the closing brace
            }
            continue; // Continue to the next iteration
          }
        }
      }
      
      // If we have an annotation, skip it
      if (trickString[i] === '{') {
        while (i < trickString.length && trickString[i] !== '}') {
          i++;
        }
        if (i < trickString.length) i++; // Move past the closing brace
      } else {
        // Something else - just move forward
        i++;
      }
    }
    
    return cardCodes;
  };

// React provided via CDN
const { useState, useEffect } = React;


// CardPicker Component
const CardPicker = ({ hands, setHands, isCardAssigned }) => {
  const [selectedHand, setSelectedHand] = useState('north');
  
  // Define suits and ranks in order
  const suits = [
    { name: 'spades', symbol: '♠', code: 's' },
    { name: 'hearts', symbol: '♥', code: 'h' },
    { name: 'diamonds', symbol: '♦', code: 'd' },
    { name: 'clubs', symbol: '♣', code: 'c' }
  ];
  
  const ranks = ['A', 'K', 'Q', 'J', 'T', '9', '8', '7', '6', '5', '4', '3', '2'];
  
  // Helpers to keep cards sorted (A K Q J T 9 ... 2)
  const rankOrder = ['A','K','Q','J','T','9','8','7','6','5','4','3','2'];
  const sortRanks = (str) => {
    if (!str) return '';
    const uniq = Array.from(new Set(str.toUpperCase().split('').filter(Boolean)));
    uniq.sort((a,b) => rankOrder.indexOf(a) - rankOrder.indexOf(b));
    return uniq.join('');
  };

  // Function to handle card click
  const handleCardClick = (suit, rank) => {
    setHands(prev => {
      const next = JSON.parse(JSON.stringify(prev));

      // If card is already assigned, remove it from whichever hand has it
      if (isCardAssigned(suit, rank)) {
        for (const direction of Object.keys(next)) {
          const s = (next[direction][suit] || '');
          if (s.includes(rank)) {
            next[direction][suit] = sortRanks(s.replace(rank, ''));
            break;
          }
        }
        return next;
      }

      // Otherwise add to selected hand (and keep sorted)
      const current = (next[selectedHand][suit] || '');
      next[selectedHand][suit] = sortRanks(current + rank);
      return next;
    });
  };
  
  // Function to get assigned hand for a card (for color-coding)
  const getAssignedHand = (suit, rank) => {
    const directions = ['north', 'east', 'south', 'west'];
    for (const direction of directions) {
      if (hands[direction][suit].includes(rank)) {
        return direction;
      }
    }
    return null;
  };
  
  // Map directions to colors for visual feedback
  const directionColors = {
    'north': 'bg-blue-100 border-blue-300 text-blue-800',
    'east': 'bg-green-100 border-green-300 text-green-800',
    'south': 'bg-red-100 border-red-300 text-red-800',
    'west': 'bg-purple-100 border-purple-300 text-purple-800'
  };
  
  return (
    <div className="p-3 border border-gray-200 rounded-md mb-4">
      <div className="flex justify-between items-center mb-3">
        <h3 className="font-medium text-md">Card Picker</h3>
        <div className="flex space-x-2">
          {/* Hand selector buttons */}
          {['north', 'east', 'south', 'west'].map(direction => (
            <button
              key={direction}
              onClick={() => setSelectedHand(direction)}
              className={`px-3 py-1 text-sm font-medium rounded-md w-20 text-center ${
                selectedHand === direction
                ? `bg-gray-800 text-white`
                : `bg-gray-100 text-gray-700 hover:bg-gray-200`
              }`}
            >
              {direction.charAt(0).toUpperCase() + direction.slice(1)}
            </button>
          ))}
        </div>
      </div>
      
      {/* Card display by suit */}
      <div className="space-y-3">
        {suits.map(suit => (
          <div key={suit.name} className="mb-3">
            <div className={`text-lg font-bold mb-1 ${
              suit.name === 'hearts' || suit.name === 'diamonds' ? 'text-red-600' : 'text-black'
            }`}>
              {suit.symbol} {suit.name.charAt(0).toUpperCase() + suit.name.slice(1)}
            </div>
            <div className="flex flex-wrap">
              {ranks.map(rank => {
                const assignedHand = getAssignedHand(suit.name, rank);
                return (
                  <button
                    key={`${suit.name}-${rank}`}
                    onClick={() => handleCardClick(suit.name, rank)}
                    className={`w-8 h-10 m-1 flex items-center justify-center text-sm font-medium border rounded
                              ${assignedHand 
                                ? directionColors[assignedHand]
                                : `hover:bg-gray-100 border-gray-300 ${
                                    suit.name === 'hearts' || suit.name === 'diamonds' ? 'text-red-600' : 'text-black'
                                  }`
                              }`}
                  >
                    {rank === 'T' ? '10' : rank}
                  </button>
                );
              })}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
};

// BridgeDiagram Component
const BridgeDiagram = ({ hands, setHands, playSequence, setPlaySequence, onUndoLastCard, onUndoTrick, cardAnnotation, setCardAnnotation, currentToAct, displayTrickLeader, displayTrickIndex, boardNumber, dealer, vulnerability, structuredAuction, contractDisplay, nsTricks, ewTricks, onRedoLastCard, canRedoLastCard, onRedoTrick, canRedoTrick, onClearPlayRedo }) => {
  const suits = [
    { name: 'spades', symbol: '♠', code: 's' },
    { name: 'hearts', symbol: '♥', code: 'h' },
    { name: 'diamonds', symbol: '♦', code: 'd' },
    { name: 'clubs', symbol: '♣', code: 'c' }
  ];

  const getVulLabel = (v) => {
    const x = (v || '').toString().toLowerCase();
    if (x === '-' || x === 'o' || x === 'none' || x === 'love') return 'None';
    if (x === 'n' || x === 'ns') return 'NS';
    if (x === 'e' || x === 'ew') return 'EW';
    if (x === 'b' || x === 'all' || x === 'both') return 'Both';
    return v || 'None';
  };

  
  // Function to determine if a card has already been played
  const isCardPlayed = (suitCode, rankCode) => {
    const cardCode = `${suitCode}${rankCode.toLowerCase()}`;
    
    // Check all tricks to see if this card has been played
    return playSequence.some(trick => {
      // Extract just the card codes from the trick string, ignoring annotations
      const cardCodes = extractCardCodes(trick);
      return cardCodes.includes(cardCode);
    });
  };
  


  // --- Drag & drop swap (between hands) ---
  const suitCodeToName = { s: 'spades', h: 'hearts', d: 'diamonds', c: 'clubs' };
  const rankToAlt = { A: '/', K: '*', Q: '-', J: '+', T: '1' };

  const removeRankOnce = (str, rankChar) => {
    if (!str) return '';
    // Try normal rank first, then alternate symbol (/,*, -, +, 1)
    if (str.includes(rankChar)) return str.replace(rankChar, '');
    const alt = rankToAlt[rankChar];
    if (alt && str.includes(alt)) return str.replace(alt, '');
    return str; // nothing removed
  };

  const addRank = (str, rankChar) => (str || '') + rankChar;

  const altToRank = { '/': 'A', '*': 'K', '-': 'Q', '+': 'J', '1': 'T' };
  const rankOrder = ['A','K','Q','J','T','9','8','7','6','5','4','3','2'];
  const toRankLetter = (ch) => altToRank[ch] || ch;

  const sortSuitString = (str) => {
    if (!str) return '';
    // Normalise to rank letters, remove duplicates, then sort high-to-low
    const letters = str
      .toUpperCase()
      .split('')
      .map(toRankLetter)
      .filter(Boolean);

    const uniq = Array.from(new Set(letters));
    uniq.sort((a,b) => rankOrder.indexOf(a) - rankOrder.indexOf(b));
    return uniq.join('');
  };

  const swapCardsBetweenHands = (from, to) => {
    if (!setHands) return;
    if (!from || !to) return;
    if (from.direction === to.direction && from.suitCode === to.suitCode && from.rank === to.rank) return;

    // Never allow swapping cards that are already in the play sequence
    const fromPlayed = isCardPlayed(from.suitCode, from.rank.toLowerCase() === 't' ? 't' : from.rank.toLowerCase());
    const toPlayed = isCardPlayed(to.suitCode, to.rank.toLowerCase() === 't' ? 't' : to.rank.toLowerCase());
    if (fromPlayed || toPlayed) return;

    const fromSuitName = suitCodeToName[from.suitCode];
    const toSuitName = suitCodeToName[to.suitCode];
    if (!fromSuitName || !toSuitName) return;

    setHands(prev => {
      const next = JSON.parse(JSON.stringify(prev));

      // Remove the two original cards
      next[from.direction][fromSuitName] = removeRankOnce(next[from.direction][fromSuitName], from.rank);
      next[to.direction][toSuitName] = removeRankOnce(next[to.direction][toSuitName], to.rank);

      // Swap the *whole cards* (rank + suit):
      // - "to" card goes into "from" player's *to-suit*
      // - "from" card goes into "to" player's *from-suit*
      next[from.direction][toSuitName] = addRank(next[from.direction][toSuitName], to.rank);
      next[to.direction][fromSuitName] = addRank(next[to.direction][fromSuitName], from.rank);

      // Re-sort the affected hands (all suits) so the diagram stays tidy
      const fixHand = (dir) => {
        if (!next[dir]) return;
        next[dir].spades = sortSuitString(next[dir].spades);
        next[dir].hearts = sortSuitString(next[dir].hearts);
        next[dir].diamonds = sortSuitString(next[dir].diamonds);
        next[dir].clubs = sortSuitString(next[dir].clubs);
      };
      fixHand(from.direction);
      fixHand(to.direction);

      return next;
    });
  };

  const onCardDragStart = (e, direction, suitCode, rankChar) => {
    try {
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('application/json', JSON.stringify({ direction, suitCode, rank: rankChar }));
    } catch (_) {}
  };

  const onCardDragOver = (e, direction, suitCode, rankChar) => {
    // Allow drop if target card is not already played
    const played = isCardPlayed(suitCode, rankChar === 'T' ? 't' : rankChar.toLowerCase());
    if (played) return;
    e.preventDefault();
    try { e.dataTransfer.dropEffect = 'move'; } catch (_) {}
  };

  const onCardDrop = (e, direction, suitCode, rankChar) => {
    e.preventDefault();
    let from = null;
    try {
      const raw = e.dataTransfer.getData('application/json') || e.dataTransfer.getData('text/plain');
      from = raw ? JSON.parse(raw) : null;
    } catch (_) {}
    if (!from) return;
    const to = { direction, suitCode, rank: rankChar };
    swapCardsBetweenHands(from, to);
  };

  // Blocked for *playing* (but still allow swap)
  const isPlayBlocked = (direction, suitCode, rankChar) => {
    const rankLower = (rankChar === 'T') ? 't' : rankChar.toLowerCase();
    return (
      isCardPlayed(suitCode, rankLower) ||
      (currentToAct && direction !== currentToAct) ||
      (currentToAct && direction === currentToAct && currentLeadSuit && currentPlayerHasLeadSuit && suitCode !== currentLeadSuit)
    );
  };

  // --- Follow-suit enforcement (no revoke) ---
  // Find the current trick index and its lead suit (if any)
  const getCurrentTrickIndexAndLeadSuit = () => {
    let leaderTrickIndex = 0;
    while (leaderTrickIndex < playSequence.length) {
      const codes = extractCardCodes(playSequence[leaderTrickIndex] || '');
      if (codes.length < 4) break;
      leaderTrickIndex++;
    }
    if (leaderTrickIndex >= 13) return { trickIndex: 12, leadSuit: null };

    const codes = extractCardCodes(playSequence[leaderTrickIndex] || '');
    const leadSuit = codes.length > 0 ? codes[0][0] : null; // 's'/'h'/'d'/'c'
    return { trickIndex: leaderTrickIndex, leadSuit };
  };

  const { leadSuit: currentLeadSuit } = getCurrentTrickIndexAndLeadSuit();

  // Does the current player (currentToAct) have any unplayed card in the lead suit?
  const currentPlayerHasLeadSuit = (() => {
    if (!currentToAct || !currentLeadSuit) return false;

    // Map suit code to our hand suit name
    const suitMap = { s: 'spades', h: 'hearts', d: 'diamonds', c: 'clubs' };
    const suitName = suitMap[currentLeadSuit];
    if (!suitName) return false;

    const ranksInSuit = (hands[currentToAct] && hands[currentToAct][suitName]) ? hands[currentToAct][suitName] : '';
    const ranks = ranksInSuit.replace(/\//g, 'A')
                             .replace(/\*/g, 'K')
                             .replace(/-/g, 'Q')
                             .replace(/\+/g, 'J')
                             .replace(/1/g, 'T')
                             .toUpperCase()
                             .split('')
                             .filter(Boolean);

    // If any card in that suit is not played yet, you must follow suit
    for (const r of ranks) {
      const rankCode = (r === 'T') ? 't' : r.toLowerCase();
      if (!isCardPlayed(currentLeadSuit, rankCode)) return true;
    }
    return false;
  })();


  // Get the current trick number
  const getCurrentTrickNumber = () => {
    // Count completed tricks (those with 4 cards)
    let completedTricks = 0;
    
    for (let i = 0; i < playSequence.length; i++) {
      // Extract actual card codes from the trick string
      const cardCodes = extractCardCodes(playSequence[i]);
      
      // If this trick has 4 cards, it's completed
      if (cardCodes.length === 4) {
        completedTricks++;
      } else if (cardCodes.length > 0) {
        // If this trick has some cards but not 4, it's the current trick
        return completedTricks + 1;
      }
    }
    
    // If all tricks are either empty or complete, the next trick is the current one
    return completedTricks + 1;
  };
  
  // Function to handle card click
  const handleCardClick = (direction, suitCode, rankCode) => {
    // Enforce turn order if provided
    if (currentToAct && direction !== currentToAct) return;
    // Create the new card code (e.g., "sa" for Ace of Spades)
    let cardCode = `${suitCode}${rankCode.toLowerCase()}`;
    
    // Add annotation if present
    if (cardAnnotation.trim()) {
      // Replace spaces with %20 for proper URL encoding
      const encodedAnnotation = encodeURIComponent(cardAnnotation);
      cardCode += `{${encodedAnnotation}}`;
    }
    
    // Find the current trick that's being filled
    // Use extractCardCodes to count actual cards in each trick
    let trickIndex = 0;
    
    while (trickIndex < playSequence.length) {
      const cardCodes = extractCardCodes(playSequence[trickIndex]);
      if (cardCodes.length < 4) {
        // Found a trick that's not full
        break;
      }
      trickIndex++;
    }
    
    if (trickIndex >= 13) {
      // All tricks are filled
      return;
    }
    
    // Create a new play sequence array
    const newPlaySequence = [...playSequence];
    
    // Add the card to the current trick
    newPlaySequence[trickIndex] = (newPlaySequence[trickIndex] || '') + cardCode;
    
    // New play invalidates redo
    if (onClearPlayRedo) onClearPlayRedo();

    // Update the play sequence
    setPlaySequence(newPlaySequence);
    
    // Clear the annotation after using it
    setCardAnnotation('');
  };
  
  // Get cards in the displayed trick (in-progress trick, or last completed trick)
  const getCurrentTrickCards = () => {
    const parseTrickString = (trickStr) => {
      const cards = [];
      let textPosition = 0;

      while (textPosition < trickStr.length) {
        if (textPosition + 1 >= trickStr.length) break;

        const suitCode = trickStr[textPosition];
        const rankCode = trickStr[textPosition + 1];

        if (['s', 'h', 'd', 'c'].includes(suitCode) &&
            ['a', 'k', 'q', 'j', 't', '9', '8', '7', '6', '5', '4', '3', '2'].includes(rankCode.toLowerCase())) {

          textPosition += 2;

          // Optional annotation in { ... }
          let annotation = '';
          if (textPosition < trickStr.length && trickStr[textPosition] === '{') {
            const startIdx = textPosition;
            while (textPosition < trickStr.length && trickStr[textPosition] !== '}') textPosition++;
            if (textPosition < trickStr.length) {
              annotation = trickStr.substring(startIdx + 1, textPosition);
              textPosition++;
            }
          }

          let suitSymbol = '?';
          if (suitCode === 's') suitSymbol = '♠';
          if (suitCode === 'h') suitSymbol = '♥';
          if (suitCode === 'd') suitSymbol = '♦';
          if (suitCode === 'c') suitSymbol = '♣';

          let rankSymbol = rankCode;
          const r = rankCode.toLowerCase();
          if (r === 'a') rankSymbol = 'A';
          else if (r === 'k') rankSymbol = 'K';
          else if (r === 'q') rankSymbol = 'Q';
          else if (r === 'j') rankSymbol = 'J';
          else if (r === 't') rankSymbol = 'T';

          cards.push({
            suit: suitSymbol,
            rank: rankSymbol,
            annotation: annotation.replace(/%20/g, ' ')
          });

          continue;
        }

        // Skip annotations or other characters
        if (trickStr[textPosition] === '{') {
          while (textPosition < trickStr.length && trickStr[textPosition] !== '}') textPosition++;
          if (textPosition < trickStr.length) textPosition++;
        } else {
          textPosition++;
        }
      }

      return cards;
    };

    // If displayTrickIndex isn't available, fall back to the first in-progress trick,
    // otherwise the last non-empty trick.
    let idx = (typeof displayTrickIndex === 'number' && displayTrickIndex >= 0) ? displayTrickIndex : -1;
    if (idx < 0) {
      let last = -1;
      for (let t = 0; t < (playSequence || []).length; t++) {
        const codes = extractCardCodes(playSequence[t] || '');
        if (codes.length > 0) last = t;
        if (codes.length > 0 && codes.length < 4) { idx = t; break; }
      }
      if (idx < 0) idx = last;
    }
    if (idx < 0) return [];
    const trickStr = playSequence[idx] || '';
    return parseTrickString(trickStr);
  };

  
  // Format a hand's cards for display with clickable cards
  const formatHand = (hand, direction) => {
    return suits.map(suit => {
      // Get normalized card ranks for this suit
      const rawRanks = hand[suit.name];
      const ranks = rawRanks.replace(/\//g, 'A')
                          .replace(/\*/g, 'K')
                          .replace(/-/g, 'Q')
                          .replace(/\+/g, 'J')
                          .replace(/1/g, 'T')
                          .toUpperCase();
      
      // Split ranks into individual cards for clicking
      const cardRanks = ranks.split('');
      
      return {
        suit: suit.symbol,
        suitCode: suit.code,
        cardRanks: cardRanks,
        color: suit.name === 'hearts' || suit.name === 'diamonds' ? 'text-red-600' : 'text-black',
        direction: direction
      };
    });
  };
  
  // Format all hands
  const northHand = formatHand(hands.north, 'north');
  const eastHand = formatHand(hands.east, 'east');
  const southHand = formatHand(hands.south, 'south');
  const westHand = formatHand(hands.west, 'west');
  
  const currentTrickNumber = getCurrentTrickNumber();
  const currentTrickCards = getCurrentTrickCards();

  return (
    <div className="mb-4">
      {/* Handviewer-style layout */}
      <div className="grid grid-cols-1 md:grid-cols-3 gap-2 items-start md:items-stretch">

        {/* Board / Dealer / Vul (next to North, top-left) */}
        <div className="border border-gray-200 rounded-md bg-white p-2 md:col-start-1 md:row-start-1">
          <div className="flex items-center space-x-3">
            <div className="w-14 h-14 border border-gray-300 rounded bg-gray-50 flex flex-col items-center justify-center">
              <div className="text-2xl font-bold leading-none">{boardNumber || '-'}</div>
                          </div>
            <div className="text-sm">
              <div><span className="font-medium">Dealer:</span> {(dealer || 'n').toUpperCase()}</div>
              <div><span className="font-medium">Vul:</span> {getVulLabel(vulnerability)}</div>
            </div>
          </div>
        </div>

        {/* North (top, middle) */}
        <div className="border border-gray-200 rounded-md p-2 bg-white md:col-start-2 md:row-start-1 h-full flex">
          <div className="mt-auto w-full">
            <div className="text-center font-medium mb-1 capitalize">North</div>
            {northHand.map((suitData, index) => (
              <div key={`north-${suitData.suit}`} className="mb-1">
                <div className="flex items-center mb-1">
                  <span className={`w-8 text-center font-bold ${suitData.color}`}>{suitData.suit}</span>
                  {suitData.cardRanks.length > 0 ? (
                    <div className="flex flex-wrap">
                      {suitData.cardRanks.map((rank, idx) => (
                        <button
                          key={`north-${suitData.suitCode}-${rank}-${idx}`}
                          onClick={() => {
                            const blocked = isPlayBlocked(suitData.direction, suitData.suitCode, rank);
                            if (blocked) return;
                            handleCardClick(suitData.direction, suitData.suitCode, rank === 'T' ? 't' : rank.toLowerCase());
                          }}
                          draggable={!isCardPlayed(suitData.suitCode, rank === 'T' ? 't' : rank.toLowerCase())}
                          onDragStart={(e) => onCardDragStart(e, suitData.direction, suitData.suitCode, rank)}
                          onDragOver={(e) => onCardDragOver(e, suitData.direction, suitData.suitCode, rank)}
                          onDrop={(e) => onCardDrop(e, suitData.direction, suitData.suitCode, rank)}
                          aria-disabled={isPlayBlocked(suitData.direction, suitData.suitCode, rank)}
                          className={`w-6 h-6 mr-1 mb-1 flex items-center justify-center text-xs font-medium border rounded
                                    ${isCardPlayed(suitData.suitCode, rank === 'T' ? 't' : rank.toLowerCase())
                                      ? 'bg-gray-100 text-gray-400 border-gray-200'
                                      : `border-gray-300 ${suitData.color} ${isPlayBlocked(suitData.direction, suitData.suitCode, rank) ? 'cursor-not-allowed' : 'hover:bg-blue-100'}`}`}
                        >
                          {rank === 'T' ? '10' : rank}
                        </button>
                      ))}
                    </div>
                  ) : (
                    <span className="text-gray-500">—</span>
                  )}
                </div>
              </div>
            ))}
          </div>
        </div>
        {/* Auction (next to North, top-right) */}
        <div className="border border-gray-200 rounded-md bg-white p-2 md:col-start-3 md:row-start-1">
          <AuctionTable structuredAuction={structuredAuction || []} dealer={dealer || 'n'} />
        </div>

// Auction Table Component
const AuctionTable = ({ structuredAuction, dealer, onEditBidAlert, onEditBidAnnotation }) => {
  const [activeAlert, setActiveAlert] = React.useState(null);
  const alertDragRef = React.useRef(null);
  const [isDraggingAlertPopup, setIsDraggingAlertPopup] = React.useState(false);
  // activeAlert: { text?: string, x: number, y: number, index?: number, editing?: boolean, tab?: 'alert' | 'note', alertText?: string, noteText?: string }
  React.useEffect(() => {
    if (!activeAlert) return;
    const handleDocClick = () => {
      if (isDraggingAlertPopup) return;
      setActiveAlert(null);
    };
    document.addEventListener('click', handleDocClick);
    return () => document.removeEventListener('click', handleDocClick);
  }, [activeAlert, isDraggingAlertPopup]);

  React.useEffect(() => {
    if (!isDraggingAlertPopup) return;

    const onMove = (e) => {
      setActiveAlert(prev => {
        if (!prev || !prev.editing) return prev;
        const d = alertDragRef.current;
        if (!d) return prev;

        const nx = d.origX + (e.clientX - d.startX);
        const ny = d.origY + (e.clientY - d.startY);

        const clamp = (v, min, max) => Math.min(Math.max(v, min), max);
        const x = clamp(nx, 12, window.innerWidth - 12);
        const y = clamp(ny, 12, window.innerHeight - 12);
        return { ...prev, x, y };
      });
    };

    const onUp = () => {
      setIsDraggingAlertPopup(false);
      alertDragRef.current = null;
    };

    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
    return () => {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };
  }, [isDraggingAlertPopup]);


  const startDragAlertPopup = (e) => {
    if (!activeAlert || !activeAlert.editing) return;
    e.preventDefault();
    e.stopPropagation();
    alertDragRef.current = {
      startX: e.clientX,
      startY: e.clientY,
      origX: activeAlert.x || 12,
      origY: activeAlert.y || 12
    };
    setIsDraggingAlertPopup(true);
  };

  // Format the auction into rows
  const formatAuctionRows = () => {
    const positions = ['w', 'n', 'e', 's'];
    const dealerIndex = positions.indexOf(dealer.toLowerCase());
    
    // Start with empty rows and first row with empty cells before dealer
    let rows = [Array(4).fill('')];
    let currentRow = 0;
    let currentPos = 0;
    
    // Fill empty cells before dealer
    for (let i = 0; i < dealerIndex; i++) {
      rows[currentRow][i] = '-';
      currentPos++;
    }
    
    // Fill in bids
    structuredAuction.forEach((bidInfo, bidIndex) => {
      const { bid, alert, annotation } = bidInfo;
      
      // Format the bid nicely
      // Format the bid nicely
      let displayBid;
      if (bid === 'p') displayBid = 'Pass';
      else if (bid === 'd') displayBid = 'X';  // Changed from Dbl to X
      else if (bid === 'r') displayBid = 'XX'; // Changed from Rdbl to XX
      else {
        const level = bid[0];
        const strain = bid[1];
        const strainSymbol = 
          strain === 'c' ? '♣' : 
          strain === 'd' ? '♦' : 
          strain === 'h' ? '♥' : 
          strain === 's' ? '♠' : 'NT';
        
        // Create JSX with different colors for strain symbols
        if (strain === 'd' || strain === 'h') {
          displayBid = (
            <span>
              <span className="text-black">{level}</span>
              <span className="text-red-600">{strainSymbol}</span>
            </span>
          );
        } else {
          displayBid = `${level}${strainSymbol}`;
        }
      }
      
      
      // Click a bid to add/edit its alert or note (when enabled in the bidding box).
      // Outside the bidding box, alerted bids still show their alert text when clicked.
      const canOpenEditor = !!onEditBidAlert || !!onEditBidAnnotation;
      if (canOpenEditor || alert) {
        const bidTextClass = bid === 'p'
          ? 'text-gray-500'
          : bid === 'd'
            ? 'text-red-600 font-medium'
            : bid === 'r'
              ? 'text-blue-600 font-medium'
              : 'text-black';

        displayBid = (
          <span
            className={`${alert ? 'bg-yellow-200' : 'hover:bg-gray-100'} ${bidTextClass} px-1 rounded cursor-pointer inline-block`}
            onClick={(e) => {
              e.stopPropagation();
              const r = e.currentTarget.getBoundingClientRect();
              const x = Math.min(r.right + 8, window.innerWidth - 320);
              const y = Math.max(r.top - 4, 8);
              if (canOpenEditor) {
                setActiveAlert({
                  x,
                  y,
                  index: bidIndex,
                  editing: true,
                  tab: 'alert',
                  alertText: alert || '',
                  noteText: annotation || ''
                });
              } else if (alert) {
                const xAbove = Math.min(Math.max(r.left + (r.width / 2), 12), window.innerWidth - 12);
                const yAbove = Math.max(r.top - 6, 12);
                setActiveAlert({ text: alert, x: xAbove, y: yAbove, editing: false });
              }
            }}
            title={canOpenEditor ? 'Click to add or edit alert or note' : 'Click to view alert'}
          >
            {displayBid}
          </span>
        );
      }

      rows[currentRow][currentPos] = displayBid;
      
      // Move to next position
      currentPos = (currentPos + 1) % 4;
      
      // If we wrapped around, create a new row *only if there are more bids to come*
      if (currentPos === 0 && bidIndex < structuredAuction.length - 1) {
        rows.push(Array(4).fill(''));
        currentRow++;
      }
    });
    
    return rows;
  };
  
  const auctionRows = formatAuctionRows();
  
  // Make sure we always display at least one row even if no bids yet
  const rowsToDisplay = auctionRows.length > 0 ? auctionRows : [Array(4).fill('')];
  
  return (
    <div className="relative">
      <table className="w-full border-collapse table-fixed">
      <thead>
        <tr>
          <th className="w-1/4 px-1 py-1 border bg-gray-100 text-center font-medium">West</th>
          <th className="w-1/4 px-1 py-1 border bg-gray-100 text-center font-medium">North</th>
          <th className="w-1/4 px-1 py-1 border bg-gray-100 text-center font-medium">East</th>
          <th className="w-1/4 px-1 py-1 border bg-gray-100 text-center font-medium">South</th>
        </tr>
      </thead>
      <tbody>
        {rowsToDisplay.map((row, rowIndex) => (
          <tr key={`row-${rowIndex}`}>
            {row.map((cell, cellIndex) => (
                              <td 
                key={`cell-${rowIndex}-${cellIndex}`} 
                className={`px-1 py-1 border text-center ${
                  cell === 'Pass' ? 'text-gray-500' : 
                  cell === 'X' ? 'text-red-600 font-medium' : 
                  cell === 'XX' ? 'text-blue-600 font-medium' : 
                  'text-black' // Default to black for all other cells
                }`}
              >
                {cell}
              </td>
            ))}
          </tr>
        ))}
      </tbody>
    </table>
      {activeAlert && (
        <div
          className={`fixed z-50 inline-block ${activeAlert.editing ? 'min-w-[220px] w-72 max-w-[calc(100vw-24px)] max-h-[calc(100vh-24px)] bg-white border border-gray-300 resize overflow-auto flex flex-col' : 'max-w-xs bg-yellow-50 border border-yellow-300'} rounded-md shadow px-2 py-2 text-xs text-gray-900`}
          style={{ left: activeAlert.x, top: activeAlert.y, transform: activeAlert.editing ? 'none' : 'translate(-50%, -100%)' }}
          onClick={(e) => e.stopPropagation()}
        >
          {activeAlert.editing && typeof activeAlert.index === 'number' ? (
            <>

              <div className="h-2 -mt-1 mb-2 cursor-move" onMouseDown={startDragAlertPopup} />
              <div className="flex mb-2 overflow-hidden rounded border border-gray-200">
                <button
                  className={`px-3 py-1 text-xs font-medium ${activeAlert.tab === 'alert' ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'}`}
                  onClick={() => setActiveAlert(prev => prev ? { ...prev, tab: 'alert' } : prev)}
                >
                  Alert
                </button>
                <button
                  className={`px-3 py-1 text-xs font-medium ${activeAlert.tab === 'note' ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'}`}
                  onClick={() => setActiveAlert(prev => prev ? { ...prev, tab: 'note' } : prev)}
                >
                  Annotation
                </button>
              </div>

              {activeAlert.tab === 'note' ? (
                <textarea
                  value={activeAlert.noteText || ''}
                  onChange={(e) => {
                    const newText = e.target.value;
                    setActiveAlert(prev => prev ? { ...prev, noteText: newText } : prev);
                    if (onEditBidAnnotation) onEditBidAnnotation(activeAlert.index, newText);
                  }}
                  rows={1}
                  autoFocus
                  style={{ minHeight: '32px' }}
                  className="w-full flex-1 px-2 py-1 border border-gray-300 rounded-md text-sm resize-none bg-white overflow-auto"
                  placeholder="Add annotation..."
                />
              ) : (
                <textarea
                  value={activeAlert.alertText || ''}
                  onChange={(e) => {
                    const newText = e.target.value;
                    setActiveAlert(prev => prev ? { ...prev, alertText: newText } : prev);
                    if (onEditBidAlert) onEditBidAlert(activeAlert.index, newText);
                  }}
                  rows={1}
                  autoFocus
                  style={{ minHeight: '32px' }}
                  className="w-full flex-1 px-2 py-1 border border-gray-300 rounded-md text-sm resize-none bg-white overflow-auto"
                  placeholder="Add alert..."
                />
              )}
            </>
          ) : (
            activeAlert.text
          )}
        </div>
      )}
    </div>
  );
};

// Bidding Box Component
const BiddingBox = ({ onBidSelected, currentAuction, dealer, onUndoLastBid, alertMessage, setAlertMessage, bidAnnotation, setBidAnnotation, onRedoLastBid, canRedoLastBid }) => {
  // Define possible bids
  const levels = [1, 2, 3, 4, 5, 6, 7];
  const suits = [
    { name: 'clubs', symbol: '♣', code: 'c' },
    { name: 'diamonds', symbol: '♦', code: 'd' },
    { name: 'hearts', symbol: '♥', code: 'h' },
    { name: 'spades', symbol: '♠', code: 's' },
    { name: 'no trump', symbol: 'NT', code: 'n' }
  ];
  
  // Check if the auction is over (3 consecutive passes after a bid)
  const isAuctionOver = () => {
    // If less than 4 bids, auction can't be over
    if (currentAuction.length < 4) return false;
    
    // Get last 3 bids
    const lastThreeBids = currentAuction.slice(-3);
    
    // Check if they're all passes
    return lastThreeBids.every(bid => bid.bid === 'p') && 
           // Make sure there's at least one non-pass bid before them
           currentAuction.some(bid => bid.bid !== 'p');
  };
  
  // Calculate who is next to bid
  const getNextToAct = () => {
    const positions = ['w', 'n', 'e', 's'];
    const dealerIndex = positions.indexOf(dealer.toLowerCase());
    
    // If no bids yet, dealer starts
    if (currentAuction.length === 0) {
      return positions[dealerIndex];
    }
    
    // Otherwise, next position after last bidder
    const lastBidderIndex = positions.indexOf(currentAuction[currentAuction.length - 1].direction);
    return positions[(lastBidderIndex + 1) % 4];
  };
  
  // Determine if a bid is legal
  const isLegalBid = (bidCode) => {
    // If auction is over (3 consecutive passes after a bid), no more bids allowed
    if (isAuctionOver()) return false;
    
    const nextToAct = getNextToAct();
    
    // Special case for pass - always legal
    if (bidCode === 'p') return true;
    
    // For double
    if (bidCode === 'd') {
      // Can only double opponent's contract
      if (currentAuction.length === 0) return false;
      
      // Find the last normal bid (not pass, double, or redouble)
      const lastNormalBid = currentAuction.slice().reverse().find(bid => 
        bid.bid !== 'p' && bid.bid !== 'd' && bid.bid !== 'r'
      );
      
      if (!lastNormalBid) return false;
      
      // Determine if the last normal bid was made by an opponent
      const currentPair = nextToAct === 'n' || nextToAct === 's' ? ['n', 's'] : ['e', 'w'];
      const isOpponentBid = !currentPair.includes(lastNormalBid.direction);
      
      // Check if there's already a double or redouble in effect for the current contract
      const reversedAuction = currentAuction.slice().reverse();
      const lastNormalBidIndex = reversedAuction.findIndex(bid => 
        bid.bid !== 'p' && bid.bid !== 'd' && bid.bid !== 'r'
      );
      
      // Extract all bids after the last normal bid
      const bidsAfterLastNormal = reversedAuction.slice(0, lastNormalBidIndex);
      const alreadyDoubled = bidsAfterLastNormal.some(bid => bid.bid === 'd');
      const alreadyRedoubled = bidsAfterLastNormal.some(bid => bid.bid === 'r');
      
      // Can double if it's an opponent's bid and not already doubled or redoubled
      return isOpponentBid && !alreadyDoubled && !alreadyRedoubled;
    }
    
    // For redouble
    if (bidCode === 'r') {
      // Can only redouble if there's a double in effect
      const reversedAuction = currentAuction.slice().reverse();
      
      // Find the last normal bid first
      const lastNormalBidIndex = reversedAuction.findIndex(bid => 
        bid.bid !== 'p' && bid.bid !== 'd' && bid.bid !== 'r'
      );
      
      if (lastNormalBidIndex === -1) return false;
      
      // Get the direction of the last normal bid
      const lastNormalBidDirection = reversedAuction[lastNormalBidIndex].direction;
      
      // Determine if we're on the same side as the last normal bid
      const currentPair = nextToAct === 'n' || nextToAct === 's' ? ['n', 's'] : ['e', 'w'];
      const isSameSideAsLastBid = currentPair.includes(lastNormalBidDirection);
      
      // Extract all bids after the last normal bid
      const bidsAfterLastNormal = reversedAuction.slice(0, lastNormalBidIndex);
      const isDoubled = bidsAfterLastNormal.some(bid => bid.bid === 'd');
      const alreadyRedoubled = bidsAfterLastNormal.some(bid => bid.bid === 'r');
      
      // Can redouble if our side's bid was doubled and not already redoubled
      return isSameSideAsLastBid && isDoubled && !alreadyRedoubled;
    }
    
    // For normal bids, check if it's higher than the previous bid
    if (currentAuction.length > 0) {
      const lastNormalBid = currentAuction.slice().reverse().find(bid => 
        bid.bid !== 'p' && bid.bid !== 'd' && bid.bid !== 'r'
      );
      
      if (lastNormalBid) {
        // Parse bid to get level and strain
        const [level, strain] = [parseInt(bidCode[0]), bidCode[1]];
        const [lastLevel, lastStrain] = [parseInt(lastNormalBid.bid[0]), lastNormalBid.bid[1]];
        
        // Strain ranking: c < d < h < s < n
        const strainRank = { c: 1, d: 2, h: 3, s: 4, n: 5 };
        
        // Check if current bid is higher
        if (level < lastLevel) return false;
        if (level === lastLevel && strainRank[strain] <= strainRank[lastStrain]) return false;
      }
    }
    
    return true;
  };
  
  return (
    <div className="mb-4">

      {levels.map(level => (

            </button>

      {/* Action buttons below level 7 in a separate row */}
      <div className="flex mt-2">

        <button

};

      for (let i = 0; i < parts.length; i++) {

        // Player names (pn)

                convertedBid += `(${annotation})`;

// Claim (mc = make claim)

// Play sequence (pc = play card)

            // Auction section (supports basic bids + PBN Notes for alerts)

            continue;

          let noteNo = null;
          const markerMatch = t.match(/^(.*?)(?:=(\d+)=)?$/);

            t = (markerMatch[1] || '').trim();
            noteNo = markerMatch[2] ? Number(markerMatch[2]) : null;
          }

          // If marker came as a standalone token right before, apply it here
          if (!noteNo && pendingNoteNo) {
            noteNo = pendingNoteNo;
            pendingNoteNo = null;
          }

          const u = t.toUpperCase();
          let bid = null;

          if (u === 'P' || u === 'PASS') bid = 'p';
          else if (u === 'X' || u === 'D' || u === 'DBL' || u === 'DOUBLE') bid = 'd';
          else if (u === 'XX' || u === 'R' || u === 'RDBL' || u === 'REDOUBLE') bid = 'r';
          else if (u.match(/^[1-7][CDHSN]$/)) bid = u.toLowerCase();

            const noteText = (noteNo && noteMap[noteNo]) ? noteMap[noteNo] : '';

          const s = (h.spades || '').toUpperCase().replace(/[^AKQJT98765432]/g, '');
          const hrt = (h.hearts || '').toUpperCase().replace(/[^AKQJT98765432]/g, '');
          const d = (h.diamonds || '').toUpperCase().replace(/[^AKQJT98765432]/g, '');
          const c = (h.clubs || '').toUpperCase().replace(/[^AKQJT98765432]/g, '');
          return `S${s}H${hrt}D${d}C${c}`;
        };

        const nHand = handToLIN(hands.north);
        const eHand = handToLIN(hands.east);
        const sHand = handToLIN(hands.south);
        const wHand = handToLIN(hands.west);

        lin += `md|${dIdx}${sHand},${wHand},${nHand},${eHand}|`;

        // sv| mapping
        const vulMap = { 'none': 'o', '-': 'o', 'n': 'n', 'ns': 'n', 'e': 'e', 'ew': 'e', 'all': 'b', 'both': 'b', 'b': 'b', 'o': 'o' };
        const sv = vulMap[(vulnerability || 'o').toLowerCase()] || 'o';
        lin += `sv|${sv}|`;

        if (boardNumber) lin += `ah|Board ${boardNumber}|`;

        // Auction -> mb/an
        const auctionTokens = [];
        const reA = /([1-7][cdhsn]|p|d|r)(?:\(([^)]*)\))?(?:\{([^}]*)\})?/gi;
        let am;
        while ((am = reA.exec(auction || '')) !== null) {
          auctionTokens.push({
            bid: am[1].toLowerCase(),
            alert: am[2] ? decodeURIComponent(am[2]) : '',
            note: am[3] ? decodeURIComponent(am[3]) : ''
          });
        }

        for (const t of auctionTokens) {
          let bidOut = t.bid;
          if (bidOut === 'p') bidOut = 'P';
          else if (bidOut === 'd') bidOut = 'X';
          else if (bidOut === 'r') bidOut = 'XX';
          else bidOut = bidOut.toUpperCase();

          lin += `mb|${bidOut}|`;
          // In LIN: use an| for alerts (popup on bid), and at| for auction annotations (movie text)
          if (t.alert && t.alert.trim()) lin += `an|${t.alert.trim()}|`;
          if (t.note && t.note.trim()) {
            lin += `nt|${t.note.trim()}|`;
          }
        }

        // Play -> pc/nt
        const fullPlay = (playSequence || []).join('');
        const cardRe = /([shdc])([akqjt98765432])(\{[^}]*\})?/gi;
        let cm;
        while ((cm = cardRe.exec(fullPlay)) !== null) {
          lin += `pc|${(cm[1] + cm[2]).toUpperCase()}|`;
          if (cm[3]) {
            const inside = cm[3].slice(1, -1);
            try {
              const note = decodeURIComponent(inside);
              if (note.trim()) {
                lin += `nt|${note.trim()}|`;
              }
            } catch {
              if (inside.trim()) {
                lin += `nt|${inside.trim()}|`;
              }
            }
          }
        }

        // Claim -> mc (same kibitz rule)
        if (!kibitzOn || playedCount >= 52) {
          const ct = String(claimedTricks || '').trim();
          if (ct) lin += `mc|${ct}|`;
        }

        const prefix = kibitzOn ? `k=${String(kibitzer).trim().toLowerCase()}&` : '';
        return `${baseUrl}?${prefix}lin=${encodeURIComponent(lin)}`;
      };

      // Output: Classic only
      const url = buildClassicUrl();

      // Remaining-cards URL: remove any played cards from the hands and omit the play record (p=)
      const buildRemainingClassicUrl = () => {
        const dirs = ['north','east','south','west'];
        const suitMap = { s: 'spades', h: 'hearts', d: 'diamonds', c: 'clubs' };
        const rankMap = { a:'A', k:'K', q:'Q', j:'J', t:'T', '9':'9', '8':'8', '7':'7', '6':'6', '5':'5', '4':'4', '3':'3', '2':'2' };

        const rem = {
          north: {
            spades: normalizeRanks(hands.north.spades),
            hearts: normalizeRanks(hands.north.hearts),
            diamonds: normalizeRanks(hands.north.diamonds),
            clubs: normalizeRanks(hands.north.clubs),
          },
          east: {
            spades: normalizeRanks(hands.east.spades),
            hearts: normalizeRanks(hands.east.hearts),
            diamonds: normalizeRanks(hands.east.diamonds),
            clubs: normalizeRanks(hands.east.clubs),
          },
          south: {
            spades: normalizeRanks(hands.south.spades),
            hearts: normalizeRanks(hands.south.hearts),
            diamonds: normalizeRanks(hands.south.diamonds),
            clubs: normalizeRanks(hands.south.clubs),
          },
          west: {
            spades: normalizeRanks(hands.west.spades),
            hearts: normalizeRanks(hands.west.hearts),
            diamonds: normalizeRanks(hands.west.diamonds),
            clubs: normalizeRanks(hands.west.clubs),
          }
        };

        // Collect played cards from the play record (ignoring annotations)
        const played = [];
        (playSequence || []).forEach(trick => {
          extractCardCodes(trick || '').forEach(cc => played.push(cc.toLowerCase()));
        });

        // Remove each played card from whichever hand currently contains it
        played.forEach(cc => {
          const suitCode = cc[0];
          const rankCode = cc[1];
          const suitName = suitMap[suitCode];
          const rank = rankMap[rankCode];
          if (!suitName || !rank) return;

          for (const d of dirs) {
            const cur = rem[d][suitName] || '';
            const pos = cur.indexOf(rank);
            if (pos !== -1) {
              rem[d][suitName] = cur.slice(0, pos) + cur.slice(pos + 1);
              break;
            }
          }
        });

        // Build URL using remaining hands only; keep names/dealer/vul/board/kibitzer/auction
        const params = [];
        const nH = formatHand(rem.north);
        const eH = formatHand(rem.east);
        const sH = formatHand(rem.south);
        const wH = formatHand(rem.west);

        if (nH) params.push(`n=${encodeForHandviewer(nH)}`);
        if (eH) params.push(`e=${encodeForHandviewer(eH)}`);
        if (sH) params.push(`s=${encodeForHandviewer(sH)}`);
        if (wH) params.push(`w=${encodeForHandviewer(wH)}`);

        if (names.north) params.push(`nn=${encodeForHandviewer(names.north)}`);
        if (names.south) params.push(`sn=${encodeForHandviewer(names.south)}`);
        if (names.east) params.push(`en=${encodeForHandviewer(names.east)}`);
        if (names.west) params.push(`wn=${encodeForHandviewer(names.west)}`);

        if (dealer) params.push(`d=${encodeForHandviewer(dealer)}`);
        if (vulnerability && vulnerability !== '-') params.push(`v=${encodeForHandviewer(vulnerability)}`);
        if (boardNumber) params.push(`b=${encodeForHandviewer(boardNumber)}`);

        if (kibitzOn) params.push(`k=${String(kibitzer).trim().toLowerCase()}`);
        if (auction) params.push(`a=${encodeForHandviewer(normalizeInnerEncoding(auction))}`);

        return `${baseUrl}?${params.join('&')}`;
      };

      const remUrl = buildRemainingClassicUrl();

      setGeneratedUrl(url);
      setRemainingUrl(remUrl);
      setError('');
    } catch (err) {
      setError('Error generating URL: ' + err.message);
    }
  }, [hands, names, dealer, vulnerability, boardNumber, kibitzer, auction, playSequence, claimedTricks]);

  // Handle hand input change
  const handleHandChange = (direction, suit, value) => {
    setHands(prev => ({
      ...prev,

        ...prev[direction],

      }

  // Handle name input change
  const handleNameChange = (direction, value) => {

  // Handle play sequence change for a specific trick
  const handlePlaySequenceChange = (trickIndex, value) => {
    const newPlaySequence = [...playSequence];
    newPlaySequence[trickIndex] = value;
    setPlaySequence(newPlaySequence);
    setPlayRedoStack([]);
  };

  // Handle auction input change manually
  const handleAuctionChange = (e) => {
    setAuction(e.target.value);

  };

  // Handle undoing the last bid
  const handleUndoLastBid = () => {
    if (structuredAuction.length > 0) {
      const removed = structuredAuction[structuredAuction.length - 1];
      setBidRedoStack(prev => [...prev, removed]);
      const newStructuredAuction = [...structuredAuction];
      newStructuredAuction.pop();
      setStructuredAuction(newStructuredAuction);
      
      // Update compact auction format
      const compactAuction = newStructuredAuction.map(item => {
        let result = item.bid;
        if (item.alert) {
          result += `(${item.alert})`;
        }
        if (item.annotation) {
          result += `{${item.annotation}}`;
        }
        return result;
      }).join('');
      
      setAuction(compactAuction);
      
      // Also clear any pending alert and annotation message
      setAlertMessage('');
      setBidAnnotation('');
    }
  };

  
  // Handle redoing the last undone bid
  const handleRedoLastBid = () => {
    if (bidRedoStack.length === 0) return;

    const redoBid = bidRedoStack[bidRedoStack.length - 1];
    const newStack = [...bidRedoStack];
    newStack.pop();
    setBidRedoStack(newStack);

    const newStructuredAuction = [...structuredAuction, redoBid];
    setStructuredAuction(newStructuredAuction);

    const compactAuction = newStructuredAuction.map(item => {
      let result = item.bid;
      if (item.alert) result += `(${item.alert})`;
      if (item.annotation) result += `{${item.annotation}}`;
      return result;
    }).join('');

    setAuction(compactAuction);
    setAlertMessage('');
    setBidAnnotation('');
  };

// Handle undoing the last card played
  const handleUndoLastCard = () => {
    // Find the last trick with cards
    let lastTrickIndex = -1;
    
    // Search backwards to find the last trick with at least one card
    for (let i = playSequence.length - 1; i >= 0; i--) {
      const cardCodes = extractCardCodes(playSequence[i]);
      if (cardCodes.length > 0) {
        lastTrickIndex = i;
        break;
      }
    }
    
    if (lastTrickIndex < 0) {
      return; // No cards to undo
    }
    
    const newPlaySequence = [...playSequence];
    const trick = newPlaySequence[lastTrickIndex];
    
    // Find the last card and any annotation that might follow it
    let i = 0;
    let lastCardStartPos = -1;
    let lastCardEndPos = -1;
    
    while (i < trick.length) {
      if (i + 1 < trick.length) {
        const possibleSuit = trick[i];
        const possibleRank = trick[i+1];
        
        // Check if this is a valid card
        if (['s', 'h', 'd', 'c'].includes(possibleSuit) && 
            ['a', 'k', 'q', 'j', 't', '9', '8', '7', '6', '5', '4', '3', '2'].includes(possibleRank.toLowerCase())) {
          lastCardStartPos = i;
          lastCardEndPos = i + 2; // Just past the card code
          
          // Check for annotation
          if (lastCardEndPos < trick.length && trick[lastCardEndPos] === '{') {
            // Card has an annotation - find the end of it
            let j = lastCardEndPos;
            while (j < trick.length && trick[j] !== '}') {
              j++;
            }
            if (j < trick.length) lastCardEndPos = j + 1; // Include the closing brace
          }
          
          // Move past the card (and annotation if present)
          i = lastCardEndPos;
        } else {
          // Not a valid card, move forward
          i++;
        }
      } else {
        i++;
      }
    }
    
    // If we found a card to remove
    if (lastCardStartPos >= 0) {
      // Remove the card and its annotation
      newPlaySequence[lastTrickIndex] = trick.substring(0, lastCardStartPos);
      const removed = trick.substring(lastCardStartPos);
      setPlayRedoStack(prev => [...prev, { trickIndex: lastTrickIndex, removed }]);
      setPlaySequence(newPlaySequence);
    }
  };

  
  // Handle redoing the last undone card played
  const handleRedoLastCard = () => {
    if (playRedoStack.length === 0) return;

    const action = playRedoStack[playRedoStack.length - 1];
    const newStack = [...playRedoStack];
    newStack.pop();
    setPlayRedoStack(newStack);

    const newPlaySequence = [...playSequence];
    const current = newPlaySequence[action.trickIndex] || '';
    newPlaySequence[action.trickIndex] = current + (action.removed || '');
    setPlaySequence(newPlaySequence);
  };

  // Undo an entire trick (up to 4 cards at once)
  const handleUndoTrick = () => {
    // Find the last trick with cards
    let lastTrickIndex = -1;
    for (let i = playSequence.length - 1; i >= 0; i--) {
      const cardCodes = extractCardCodes(playSequence[i]);
      if (cardCodes.length > 0) {
        lastTrickIndex = i;
        break;
      }
    }
    if (lastTrickIndex < 0) return;

    const trickStr = playSequence[lastTrickIndex] || '';
    const cards = parseTrickCardsWithAnnotations(trickStr);
    const k = cards.length;
    if (k === 0) return;

    const undoCount = Math.min(4, k);
    const keepCards = cards.slice(0, k - undoCount);
    const undoCards = cards.slice(k - undoCount);

    const toSegment = (c) => {
      const cc = `${c.suitCode}${c.rankCode}`;
      return c.rawAnn ? `${cc}{${c.rawAnn}}` : cc;
    };

    const newPlaySequence = [...playSequence];
    newPlaySequence[lastTrickIndex] = keepCards.map(toSegment).join('');
    setPlaySequence(newPlaySequence);

    // Push redo actions so redo restores in correct order (A then B then C then D)
    const actions = undoCards.map(toSegment).reverse().map(seg => ({ trickIndex: lastTrickIndex, removed: seg }));
    setPlayRedoStack(prev => [...prev, ...actions]);
  };

  // Redo an entire trick (up to 4 cards at once, same trick only)
  const handleRedoTrick = () => {
    if (playRedoStack.length === 0) return;

    const newStack = [...playRedoStack];
    const top = newStack[newStack.length - 1];
    if (!top) return;

    const t = top.trickIndex;
    const toRedo = [];
    while (newStack.length > 0 && toRedo.length < 4 && newStack[newStack.length - 1].trickIndex === t) {
      toRedo.push(newStack.pop());
    }

    const newPlaySequence = [...playSequence];
    const current = newPlaySequence[t] || '';
    newPlaySequence[t] = current + toRedo.map(a => a.removed || '').join('');
    setPlaySequence(newPlaySequence);
    setPlayRedoStack(newStack);
  };


// Toggle bridge diagram visibility

  // Generate a random deal
  const generateRandomDeal = () => {
    // Create a deck of 52 cards
    const deck = [];
    
    // Build the deck
    for (const suit of suits) {
      for (const rank of ranks) {
        deck.push({ suit: suit.name, rank });
      }
    }
    
    // Shuffle the deck using Fisher-Yates algorithm
    for (let i = deck.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [deck[i], deck[j]] = [deck[j], deck[i]];
    }
    
    // Deal cards to players
    const players = ['north', 'east', 'south', 'west'];
    const playerHands = {
      north: { spades: '', hearts: '', diamonds: '', clubs: '' },
      east: { spades: '', hearts: '', diamonds: '', clubs: '' },
      south: { spades: '', hearts: '', diamonds: '', clubs: '' },
      west: { spades: '', hearts: '', diamonds: '', clubs: '' }
    };
    
    // Deal 13 cards to each player
    for (let i = 0; i < deck.length; i++) {
      const player = players[Math.floor(i / 13)];
      const { suit, rank } = deck[i];
      playerHands[player][suit] += rank;
    }
    
    // Sort each suit from highest to lowest
    for (const player of players) {
      for (const suit of suits.map(s => s.name)) {

  const startDragPlayPopup = (e) => {
