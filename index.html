  // Parse compact auction string (e.g. "1c(alert){note}p1d...") into structuredAuction
  // This is used to ensure alerts/annotations are preserved even if the user edited the auction text manually.
  const parseCompactAuctionString = (auctionStr, dealerChar) => {
    const s = (auctionStr || '').trim();
    if (!s) return [];
    const positions = ['w', 'n', 'e', 's'];
    const dealerIdx = Math.max(0, positions.indexOf((dealerChar || 'n').toLowerCase()));
    let i = 0;
    let bidIndex = 0;
    const out = [];

    const readUntil = (endCh) => {
      let start = i;
      let depth = 0;
      // assume current char is the opener
      i++; // skip opener
      start = i;
      while (i < s.length) {
        const ch = s[i];
        if (ch === endCh && depth === 0) {
          const val = s.slice(start, i);
          i++; // consume end
          return val;
        }
        // no nesting expected, but handle escaped endCh minimally
        i++;
      }
      // if no closing found, take rest
      return s.slice(start);
    };

    while (i < s.length) {
      // skip whitespace just in case
      while (i < s.length && /\s/.test(s[i])) i++;
      if (i >= s.length) break;

      let bid = '';
      const ch = s[i];

      // bids are: p/d/r OR level+suit (1-7 + c/d/h/s/n)
      if (ch === 'p' || ch === 'P') { bid = 'p'; i += 1; }
      else if (ch === 'd' || ch === 'D' || ch === 'x' || ch === 'X') { bid = 'd'; i += 1; }
      else if (ch === 'r' || ch === 'R') { bid = 'r'; i += 1; }
      else if (/[1-7]/.test(ch) && i + 1 < s.length && /[cdhsnCDHSN]/.test(s[i + 1])) {
        bid = (s[i] + s[i + 1]).toLowerCase();
        i += 2;
      } else {
        // Unknown char, skip to avoid infinite loop
        i += 1;
        continue;
      }

      // optional alert ( ... )
      let alert = '';
      if (i < s.length && s[i] === '(') {
        alert = (readUntil(')') || '').trim();
      }

      // optional annotation { ... }
      let annotation = '';
      if (i < s.length && s[i] === '{') {
        annotation = (readUntil('}') || '').trim();
      }

      const direction = positions[(dealerIdx + bidIndex) % 4];
      out.push({ direction, bid, alert, annotation });
      bidIndex++;
    }

    return out;
  };

  // Generate PBN format
  const generatePBN = () => {
    try {
      // Use parsed auction from the compact auction string when available,
      // to ensure all alerts/annotations are exported even after manual edits.
      const parsedAuction = parseCompactAuctionString(auction, dealer);
      const structuredAuctionForExport = (parsedAuction.length >= (structuredAuction?.length || 0))
        ? parsedAuction
        : (structuredAuction || []);

      let pbn = '';
      
      // Add PBN version indicator
      pbn += '% PBN 2.1\n';
      pbn += '% EXPORT\n';
      
      // Event tag (use board number if available)
      pbn += `[Event "${boardNumber ? `Board ${boardNumber}` : ''}"]\n`;
      
      // Site tag
      pbn += '[Site ""]\n';
      
      // Date tag (use current date in PBN format: YYYY.MM.DD)
      const today = new Date();
      const year = today.getFullYear();
      const month = String(today.getMonth() + 1).padStart(2, '0');
      const day = String(today.getDate()).padStart(2, '0');
      pbn += `[Date "${year}.${month}.${day}"]\n`;
      
      // Board tag
      pbn += `[Board "${boardNumber || ''}"]\n`;
      
      // Player name tags
      pbn += `[West "${names.west || ''}"]\n`;
      pbn += `[North "${names.north || ''}"]\n`;
      pbn += `[East "${names.east || ''}"]\n`;
      pbn += `[South "${names.south || ''}"]\n`;
      
      // Dealer tag
      pbn += `[Dealer "${dealer.toUpperCase()}"]\n`;
      
      // Vulnerable tag
      let vulValue = '';
      switch (vulnerability) {
        case '-': vulValue = 'None'; break;
        case 'n': vulValue = 'NS'; break;
        case 'e': vulValue = 'EW'; break;
        case 'b': vulValue = 'All'; break;
        default: vulValue = 'None';
      }
      pbn += `[Vulnerable "${vulValue}"]\n`;
      
      // Deal tag - format: "N:SAK.HQJ.D.C AKQ.HJT.D.C ..."
      const formatPBNHand = (hand) => {
        const suits = ['spades', 'hearts', 'diamonds', 'clubs'];
        return suits.map(suit => {
          const cards = normalizeRanks(hand[suit]).toUpperCase();
          return cards || '';
        }).join('.');
      };
      
      const dealParts = [
        formatPBNHand(hands.north),
        formatPBNHand(hands.east),
        formatPBNHand(hands.south),
        formatPBNHand(hands.west)
      ];
      
      // Start with dealer
      const dealerIndex = ['n', 'e', 's', 'w'].indexOf(dealer.toLowerCase());
      const orderedDeals = [
        ...dealParts.slice(dealerIndex),
        ...dealParts.slice(0, dealerIndex)
      ];
      
      pbn += `[Deal "${dealer.toUpperCase()}:${orderedDeals.join(' ')}"]\n`;
      
      // Scoring tag
      pbn += '[Scoring ""]\n';
      
      // Declarer tag
      let declarerValue = '';
      if (structuredAuctionForExport.length > 0) {
        // Find the last non-pass bid to determine declarer
        const lastBid = structuredAuctionForExport.slice().reverse().find(bid => 
          bid.bid !== 'p' && bid.bid !== 'd' && bid.bid !== 'r'
        );
        if (lastBid) {
          // Find the first player on this side to bid this strain
          const strain = lastBid.bid[1];
          const side = lastBid.direction === 'n' || lastBid.direction === 's' ? ['n', 's'] : ['e', 'w'];
          const firstBidder = structuredAuctionForExport.find(bid => 
            bid.bid.length >= 2 && bid.bid[1] === strain && side.includes(bid.direction)
          );
          if (firstBidder) {
            declarerValue = firstBidder.direction.toUpperCase();
          }
        }
      }
      pbn += `[Declarer "${declarerValue}"]\n`;
      
      // Contract tag
      let contractValue = '';
      if (structuredAuctionForExport.length > 0) {
        // Check if all passed
        const allPassed = structuredAuctionForExport.every(bid => bid.bid === 'p');
        if (allPassed) {
          contractValue = 'Pass';
        } else {
          // Find the last non-pass bid
          const lastBid = structuredAuctionForExport.slice().reverse().find(bid => 
            bid.bid !== 'p' && bid.bid !== 'd' && bid.bid !== 'r'
          );
          if (lastBid) {
            let contract = lastBid.bid.toUpperCase();
            
            // Check for doubles/redoubles after this bid
            const lastBidIndex = structuredAuctionForExport.lastIndexOf(lastBid);
            const afterBids = structuredAuctionForExport.slice(lastBidIndex + 1);
            
            let doubled = false;
            let redoubled = false;
            for (const bid of afterBids) {
              if (bid.bid === 'd') doubled = true;
              if (bid.bid === 'r') redoubled = true;
              if (bid.bid !== 'p' && bid.bid !== 'd' && bid.bid !== 'r') {
                doubled = false;
                redoubled = false;
              }
            }
            
            if (redoubled) contract += 'XX';
            else if (doubled) contract += 'X';
            
            contractValue = contract;
          }
        }
      }
      pbn += `[Contract "${contractValue}"]\n`;
      
      // Result tag
      pbn += '[Result ""]\n';
      
      // Add auction section if present
      if (structuredAuctionForExport.length > 0) {
        pbn += `[Auction "${dealer.toUpperCase()}"]\n`;

        // Build alert notes (PBN Notes) for maximum compatibility:
        // - In the Auction, append " =n=" after the bid
        // - Then add [Note "n:..."] tags below
        const noteNumberByBidIndex = {};
        const alertNotes = [];
        structuredAuctionForExport.forEach((bidInfo, idx) => {
          const a = (bidInfo.alert || '').trim();
          if (a) {
            const n = alertNotes.length + 1;
            noteNumberByBidIndex[idx] = n;
            alertNotes.push({ n, text: a });
          }
        });

        // Group bids by 4
        let auctionLine = '';
        let bidCount = 0;

        for (let i = 0; i < structuredAuctionForExport.length; i++) {
          const bidInfo = structuredAuctionForExport[i];
          let bidText = bidInfo.bid.toUpperCase();
          if (bidInfo.bid === 'p') bidText = 'Pass';
          else if (bidInfo.bid === 'd') bidText = 'X';
          else if (bidInfo.bid === 'r') bidText = 'XX';

          // Add alert note marker if present
          const noteNo = noteNumberByBidIndex[i];
          if (noteNo) bidText += `=${noteNo}=`;

          auctionLine += bidText;
          bidCount++;

          if (bidCount % 4 === 0) {
            pbn += auctionLine + '\n';
            auctionLine = '';
          } else {
            auctionLine += '\t';
          }
        }

        if (auctionLine.trim()) {
          pbn += auctionLine.trim() + '\n';
        }

        // Add note explanations (only alerts; annotations are stored in app metadata below)
        for (const n of alertNotes) {
          // Keep it simple: "index:text"
          pbn += `[Note "${n.n}:${n.text.replace(/"/g, "'")}"]\n`;
        }
      }

      // Add play section if present
      const hasPlay = playSequence.some(trick => trick !== '');
      if (hasPlay) {
        // Determine opening leader (declarer's left hand opponent)
        let leader = '';
        if (declarerValue) {
          const positions = ['w', 'n', 'e', 's'];
          const declarerIdx = positions.indexOf(declarerValue.toLowerCase());
          leader = positions[(declarerIdx + 1) % 4].toUpperCase();
        }
        
        if (leader) {
          pbn += `[Play "${leader}"]\n`;
          
          // Format play sequence
          for (const trick of playSequence) {
            if (trick) {
              // Extract cards from trick (ignoring annotations for now)
              const cards = extractCardCodes(trick);
              const playLine = cards.map(card => card.toUpperCase()).join('\t');
              if (playLine) {
                pbn += playLine + '\n';
              }
            }
          }
        }
      }
      
      // --- BridgeHandviewer app metadata (for round-trip import) ---
      // Stored as comment lines so other PBN tools should ignore it safely.
      try {
        const meta = {
          app: "BridgeHandviewerApp",
          version: 1,
          names,
          dealer,
          vulnerability,
          boardNumber,
          claimedTricks,
          structuredAuctionForExport,
          playSequence
        };

        const json = JSON.stringify(meta);

        // Base64 encode UTF-8 safely
        const b64 = btoa(unescape(encodeURIComponent(json)));

        pbn += `%BHVA-BEGIN\n`;
        // Split into chunks so no single line gets too long
        for (let i = 0; i < b64.length; i += 76) {
          pbn += `%BHVA:${b64.slice(i, i + 76)}\n`;
        }
        pbn += `%BHVA-END\n`;
      } catch (e) {
        // If encoding fails, skip metadata (PBN stays valid)
      }

      pbn += '\n';
      
      return pbn;
    } catch (err) {
      setError(`Failed to generate PBN: ${err.message}`);
      return '';
    }
  };

  // Download PBN file
  const downloadPBN = () => {
    try {
      const pbnContent = generatePBN();
      if (!pbnContent) return;
      
      const blob = new Blob([pbnContent], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = `board${boardNumber || 'deal'}.pbn`;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
    } catch (err) {
      setError(`Failed to download PBN: ${err.message}`);
    }
  };



  // Generate LIN format (BBO Handviewer compatible)
  const generateLIN = () => {
    try {
      // Helper: convert our hand object to LIN hand string (S...H...D...C...)
      const normRanks = (s) => (s || '').toUpperCase().replace(/10/g, 'T');

      const encodeHandLIN = (hand) => {
        const sp = normRanks(hand?.spades);
        const he = normRanks(hand?.hearts);
        const di = normRanks(hand?.diamonds);
        const cl = normRanks(hand?.clubs);
        return `S${sp}H${he}D${di}C${cl}`;
      };

      // Dealer mapping: 1=S, 2=W, 3=N, 4=E
      const dealerMap = { s: '1', w: '2', n: '3', e: '4' };
      const dealerNum = dealerMap[(dealer || 'n').toLowerCase()] || '3';

      // Names in LIN are South, West, North, East
      // IMPORTANT: Do NOT URL-encode spaces (e.g., %20). BBO import expects plain text.
      // Also, LIN uses '|' and ',' as separators, so strip those from names.
      const safeName = (v) =>
        (v || '')
          .toString()
          .replace(/[|]/g, ' ')
          .replace(/,/g, ' ')
          .replace(/\s+/g, ' ')
          .trim();

      const pn = [
        safeName(names?.south),
        safeName(names?.west),
        safeName(names?.north),
        safeName(names?.east)
      ].join(',');

      // Hands in LIN are South, West, North, East
      const mdHands = [
        encodeHandLIN(hands?.south),
        encodeHandLIN(hands?.west),
        encodeHandLIN(hands?.north),
        encodeHandLIN(hands?.east)
      ].join(',');

      // Vulnerability: o (none), n (NS), e (EW), b (both)
      const vulMap = { '-': 'o', 'n': 'n', 'e': 'e', 'b': 'b' };
      const sv = vulMap[(vulnerability || '-').toLowerCase()] || 'o';

      // Auction: rebuild from compact auction string so alerts aren't lost after edits
      const parsedAuction = parseCompactAuctionString(auction, dealer);
      const structuredAuctionForExport = (parsedAuction.length >= (structuredAuction?.length || 0))
        ? parsedAuction
        : (structuredAuction || []);

      let lin = '';
      lin += `pn|${pn}|`;
      lin += `md|${dealerNum}${mdHands}|`;
      lin += `sv|${sv}|`;
      if (boardNumber) lin += `ah|Board ${String(boardNumber)}|`;

      // Auction tokens
      structuredAuctionForExport.forEach((b) => {
        const bid = (b?.bid || '').toLowerCase();
        if (!bid) return;

        // BBO expects mb values like p/d/r or 1c/1d/1h/1s/1n
        let mb = bid;
        if (bid === 'x') mb = 'd';
        if (bid === 'xx') mb = 'r';

        lin += `mb|${mb}|`;

        // Prefer alert, but if only annotation exists, include that too
        const a1 = (b?.alert || '').trim();
        const a2 = (b?.annotation || '').trim();
        const expl = (a1 && a2) ? `${a1} | ${a2}` : (a1 || a2);

        if (expl) {
          lin += `an|${encodeURIComponent(expl)}|`;
        }
      });

      // Play tokens (pc)
      const toBboCard = (code) => {
        if (!code || code.length < 2) return '';
        const suit = code[0].toUpperCase(); // s/h/d/c
        let rank = code[1];
        // allow 10 encoded as 't'
        const rankMap = { a: 'A', k: 'K', q: 'Q', j: 'J', t: 'T' };
        rank = rankMap[rank.toLowerCase()] || rank.toUpperCase();
        const suitMap = { S: 'S', H: 'H', D: 'D', C: 'C', s: 'S', h: 'H', d: 'D', c: 'C' };
        return `${suitMap[suit] || suit}${rank}`;
      };

      // playSequence is array of 13 trick strings (may include annotations)
      const allCards = [];
      (playSequence || []).forEach((trickStr) => {
        const codes = extractCardCodes(String(trickStr || ''));
        codes.forEach((c) => allCards.push(c));
      });

      allCards.forEach((c) => {
        const card = toBboCard(c);
        if (card) lin += `pc|${card}|`;
      });

      return lin;
    } catch (err) {
      setError(`Failed to generate LIN: ${err.message}`);
      return '';
    }
  };

  // Download LIN file
  const downloadLIN = () => {
    try {
      const linContent = generateLIN();
      if (!linContent) return;

      const blob = new Blob([linContent], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = `board${boardNumber || 'deal'}.lin`;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
    } catch (err) {
      setError(`Failed to download LIN: ${err.message}`);
    }
  };
  // Directions in the correct order: North, East, South, West
  const directions = ['north', 'east', 'south', 'west'];

  // --- Turn order enforcement for play sequence ---
  const dirShortToLong = { n: 'north', e: 'east', s: 'south', w: 'west' };
  const playOrder = ['north', 'east', 'south', 'west']; // clockwise

  const nextClockwise = (dirLong) => {
    const i = playOrder.indexOf(dirLong);
    return playOrder[(i + 1) % 4];
  };

  // Determine final contract + declarer from the structured auction
  const getContractInfo = (structuredAuction) => {
    if (!structuredAuction || structuredAuction.length === 0) return null;

    const lastNormal = [...structuredAuction].reverse().find(b => b.bid && b.bid !== 'p' && b.bid !== 'd' && b.bid !== 'r');
    if (!lastNormal || !lastNormal.bid || lastNormal.bid.length < 2) return null;

    const strain = lastNormal.bid[1]; // c/d/h/s/n
    const side = (lastNormal.direction === 'n' || lastNormal.direction === 's') ? 'ns' : 'ew';

    // Declarer = first player on that side who bid that strain
    const firstBidder = structuredAuction.find(b =>
      b.bid && b.bid.length === 2 &&
      b.bid[1] === strain &&
      ((side === 'ns' && (b.direction === 'n' || b.direction === 's')) ||
       (side === 'ew' && (b.direction === 'e' || b.direction === 'w')))
    );

    const declarerShort = firstBidder ? firstBidder.direction : lastNormal.direction;
    const declarer = dirShortToLong[declarerShort] || 'north';

    return { trump: strain, declarer };
  };

  const rankValue = (r) => {
    const m = { a: 14, k: 13, q: 12, j: 11, t: 10, '9': 9, '8': 8, '7': 7, '6': 6, '5': 5, '4': 4, '3': 3, '2': 2 };
    return m[r] || 0;
  };

  // Given a trick string, leader dir, and trump, return winning dir
  const getTrickWinner = (trickString, leaderDir, trump) => {
    const cards = extractCardCodes(trickString || '');
    if (cards.length === 0) return leaderDir;

    const leadSuit = cards[0][0];
    const trumpSuit = (trump && trump !== 'n') ? trump : null;

    let winningIndex = 0;
    const isTrump = (c) => trumpSuit && c[0] === trumpSuit;
    const anyTrumpPlayed = trumpSuit ? cards.some(isTrump) : false;

    for (let i = 1; i < cards.length; i++) {
      const c = cards[i];
      const w = cards[winningIndex];

      if (anyTrumpPlayed) {
        if (isTrump(c) && !isTrump(w)) winningIndex = i;
        else if (isTrump(c) && isTrump(w) && rankValue(c[1]) > rankValue(w[1])) winningIndex = i;
      } else {
        if (c[0] === leadSuit && w[0] === leadSuit) {
          if (rankValue(c[1]) > rankValue(w[1])) winningIndex = i;
        } else if (c[0] === leadSuit && w[0] !== leadSuit) {
          winningIndex = i;
        }
      }
    }

    const leaderIndex = playOrder.indexOf(leaderDir);
    return playOrder[(leaderIndex + winningIndex) % 4];
  };

  // Compute whose turn it is to play next, and who is leading the current trick
  // Also compute which trick should be displayed on the table (keep last completed trick visible).
  const computeTurnState = (playSequence, contractInfo) => {
    if (!contractInfo) return { toAct: null, leader: null, displayIndex: -1, displayLeader: null };

    const opener = nextClockwise(contractInfo.declarer); // opening lead = LHO of declarer
    let leader = opener;

    let lastNonEmpty = -1;
    let leaderAtLastNonEmpty = opener;

    for (let t = 0; t < 13; t++) {
      const trick = playSequence[t] || '';
      const cards = extractCardCodes(trick);

      // Track last non-empty trick and its leader-at-start
      if (cards.length > 0) {
        lastNonEmpty = t;
        leaderAtLastNonEmpty = leader;
      }

      // Empty trick -> next to act is the leader (new trick)
      if (cards.length === 0) {
        return {
          toAct: leader,
          leader,
          displayIndex: lastNonEmpty,
          displayLeader: lastNonEmpty >= 0 ? leaderAtLastNonEmpty : leader
        };
      }

      // In-progress trick
      if (cards.length < 4) {
        const leaderIndex = playOrder.indexOf(leader);
        return {
          toAct: playOrder[(leaderIndex + cards.length) % 4],
          leader,
          displayIndex: t,
          displayLeader: leader
        };
      }

      // Completed trick -> next trick leader is the winner
      leader = getTrickWinner(trick, leader, contractInfo.trump);
    }

    return { toAct: null, leader: null, displayIndex: lastNonEmpty, displayLeader: leaderAtLastNonEmpty };
  };





  // ---- Annotation helpers (Phase 1: parse & edit annotations inside playSequence) ----
  const safeDecode = (s) => {
    try { return decodeURIComponent(s || ''); } catch (_) { return (s || '').replace(/%20/g, ' '); }
  };

  const parseTrickCardsWithAnnotations = (trickStr) => {
    const cards = [];
    let i = 0;
    const s = trickStr || '';
    while (i < s.length) {
      if (i + 1 < s.length) {
        const suitCode = s[i];
        const rankCode = s[i + 1];
        if (['s','h','d','c'].includes(suitCode) &&
            ['a','k','q','j','t','9','8','7','6','5','4','3','2'].includes((rankCode || '').toLowerCase())) {

          i += 2;

          let rawAnn = '';
          if (i < s.length && s[i] === '{') {
            const start = i + 1;
            while (i < s.length && s[i] !== '}') i++;
            const end = i;
            rawAnn = s.substring(start, end);
            if (i < s.length && s[i] === '}') i++;
          }

          cards.push({
            suitCode,
            rankCode: (rankCode || '').toLowerCase(),
            rawAnn,
            annText: rawAnn ? safeDecode(rawAnn) : ''
          });
          continue;
        }
      }

      // Skip stray annotations or chars
      if (s[i] === '{') {
        while (i < s.length && s[i] !== '}') i++;
        if (i < s.length) i++;
      } else {
        i++;
      }
    }
    return cards;
  };

  const suitSymbolFromCode = (c) => (c === 's' ? '♠' : c === 'h' ? '♥' : c === 'd' ? '♦' : c === 'c' ? '♣' : '?');
  const rankSymbolFromCode = (r) => (r === 'a' ? 'A' : r === 'k' ? 'K' : r === 'q' ? 'Q' : r === 'j' ? 'J' : r === 't' ? 'T' : (r || '').toUpperCase());

  const computeTrickLeadersAtStart = (playSequence, contractInfo) => {
    if (!contractInfo) return Array(13).fill('north');
    const leaders = [];
    let leader = nextClockwise(contractInfo.declarer); // opening lead = LHO of declarer
    for (let t = 0; t < 13; t++) {
      leaders[t] = leader;
      const trick = playSequence[t] || '';
      const codes = extractCardCodes(trick);
      if (codes.length === 4) {
        leader = getTrickWinner(trick, leader, contractInfo.trump);
      } else {
        // trick not complete: leader for later tricks is unknown yet, but we keep current leader
      }
    }
    return leaders;
  };

  const computeAnnotatedPlays = (playSequence, contractInfo) => {
    if (!contractInfo) return [];
    const leaders = computeTrickLeadersAtStart(playSequence, contractInfo);
    const out = [];

    for (let t = 0; t < 13; t++) {
      const trickStr = playSequence[t] || '';
      const cards = parseTrickCardsWithAnnotations(trickStr);
      if (!cards.length) continue;

      const leader = leaders[t];
      const leaderIndex = playOrder.indexOf(leader);

      cards.forEach((c, i) => {
        if (!c.rawAnn) return;
        const seat = playOrder[(leaderIndex + i) % 4];
        const suitSym = suitSymbolFromCode(c.suitCode);
        const rankSym = rankSymbolFromCode(c.rankCode);
        out.push({
          key: `${t}-${i}`,
          trickIndex: t,
          cardIndex: i,
          seat,
          suitSym,
          rankSym,
          isRed: suitSym === '♥' || suitSym === '♦',
          text: c.annText
        });
      });
    }

    // Already in trick order by construction
    return out;
  };

  const updatePlayAnnotation = (trickIndex, cardIndex, newText) => {
    setPlaySequence(prev => {
      const next = [...prev];
      const trickStr = next[trickIndex] || '';
      const cards = parseTrickCardsWithAnnotations(trickStr);

      if (cardIndex < 0 || cardIndex >= cards.length) return prev;

      const trimmed = (newText || '');
      cards[cardIndex].rawAnn = trimmed ? encodeURIComponent(trimmed) : '';

      // Rebuild trick string
      const rebuilt = cards.map(c => {
        const cc = `${c.suitCode}${c.rankCode}`;
        return c.rawAnn ? `${cc}{${c.rawAnn}}` : cc;
      }).join('');

      next[trickIndex] = rebuilt;
      return next;
    });
  };

  // Build a handviewer-style contract label (e.g. 3♣ X W)
  const getContractDisplay = (structuredAuction) => {
    if (!structuredAuction || structuredAuction.length === 0) return '';
    const lastNormalIndex = [...structuredAuction].map((b, i) => ({ b, i }))
      .reverse()
      .find(x => x.b && x.b.bid && x.b.bid !== 'p' && x.b.bid !== 'd' && x.b.bid !== 'r' && x.b.bid.length >= 2);
    if (!lastNormalIndex) return '';
    const lastNormal = lastNormalIndex.b;
    const level = lastNormal.bid[0];
    const strain = lastNormal.bid[1];

    const strainSymbol =
      strain === 'c' ? '♣' :
      strain === 'd' ? '♦' :
      strain === 'h' ? '♥' :
      strain === 's' ? '♠' : 'NT';

    // Doubling status after the last normal bid
    const after = structuredAuction.slice(lastNormalIndex.i + 1);
    const isRedoubled = after.some(x => x.bid === 'r');
    const isDoubled = after.some(x => x.bid === 'd');
    const dbl = isRedoubled ? 'XX' : (isDoubled ? 'X' : '');

    // Declarer = first player on that side who bid the strain
    const side = (lastNormal.direction === 'n' || lastNormal.direction === 's') ? ['n', 's'] : ['e', 'w'];
    const firstBidder = structuredAuction.find(b =>
      b && b.bid && b.bid.length === 2 && b.bid[1] === strain && side.includes(b.direction)
    );
    const declarer = (firstBidder ? firstBidder.direction : lastNormal.direction || 'n').toUpperCase();

    return `${level}${strainSymbol}${dbl ? ' ' + dbl : ''} ${declarer}`.trim();
  };

  const computeTrickCounts = (playSequence, contractInfo) => {
    if (!contractInfo) return { ns: 0, ew: 0 };
    const opener = nextClockwise(contractInfo.declarer);
    let leader = opener;

    let ns = 0;
    let ew = 0;

    for (let t = 0; t < 13; t++) {
      const trick = playSequence[t] || '';
      const cards = extractCardCodes(trick);
      if (cards.length < 4) break; // only count completed tricks in order
      const winner = getTrickWinner(trick, leader, contractInfo.trump);
      if (winner === 'north' || winner === 'south') ns++;
      else ew++;
      leader = winner;
    }

    return { ns, ew };
  };

  const contractInfo = getContractInfo(structuredAuction);
  const contractDisplay = getContractDisplay(structuredAuction);
  const trickCounts = computeTrickCounts(playSequence, contractInfo);
  const turnState = computeTurnState(playSequence, contractInfo);
  const currentToAct = turnState.toAct;
  const currentTrickLeader = turnState.leader;
  const displayTrickLeader = turnState.displayLeader;
  const displayTrickIndex = turnState.displayIndex;
  const annotatedPlays = computeAnnotatedPlays(playSequence, contractInfo);

  const playGridRows = Array.from({ length: 13 }).map((_, trickIndex) => {
    const cards = parseTrickCardsWithAnnotations(playSequence[trickIndex] || '');
    return {
      trickIndex,
      cards: Array.from({ length: 4 }).map((__, cardIndex) => {
        const c = cards[cardIndex];
        if (!c) return null;
        const suitMap = { s: '♠', h: '♥', d: '♦', c: '♣' };
        const suitSym = suitMap[c.suitCode] || '?';
        const rankSym = (c.rankCode || '').toUpperCase();
        const text = c.annText || '';
        return {
          trickIndex,
          cardIndex,
          suitSym,
          rankSym,
          text,
          isRed: suitSym === '♥' || suitSym === '♦',
          isAnnotated: !!text
        };
      })
    };
  });
return (
    <div className="p-4 bg-gray-50 min-h-screen">
      <div className="max-w-4xl mx-auto bg-white rounded-lg shadow">
        <div className="p-4">
          <div className="flex justify-between items-center mb-4">
            <h1 className="text-xl font-bold text-gray-800">BBO Handviewer Link Generator</h1>
            <div className="flex space-x-2">
              <button
                onClick={toggleHelp}
                className="h-8 w-8 flex items-center justify-center text-gray-500 hover:text-blue-600 transition"
                aria-label="Information"
              >
                
<svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
  <circle cx="12" cy="12" r="9" strokeWidth="2"/>
  <line x1="12" y1="10" x2="12" y2="16" strokeWidth="2"/>
  <circle cx="12" cy="7" r="1"/>
</svg>

              </button>
              <button
                onClick={() => setShowImport(!showImport)}
                className="px-3 py-1 bg-purple-600 text-white rounded-md hover:bg-purple-700 transition"
                title="Import from BBO/Intobridge URL"
              >
                Import
              </button>
              <button
                onClick={generateRandomDeal}
                className="px-3 py-1 bg-green-600 text-white rounded-md hover:bg-green-700 transition"
                title="Generate random hands"
              >
                Random
              </button>
              <button
                onClick={resetForm}
                className="px-3 py-1 bg-red-600 text-white rounded-md hover:bg-red-700 transition"
              >
                Reset
              </button>
            </div>
          </div>
          
          {showImport && (

  <script>
    (function () {
      function ensureBox() {
        var box = document.getElementById('error-overlay');
        if (!box) {
          box = document.createElement('pre');
          box.id = 'error-overlay';
          box.style.position = 'fixed';
          box.style.left = '12px';
          box.style.right = '12px';
          box.style.bottom = '12px';
          box.style.maxHeight = '40vh';
          box.style.overflow = 'auto';
          box.style.padding = '10px';
          box.style.background = 'rgba(0,0,0,0.85)';
          box.style.color = '#fff';
          box.style.fontSize = '12px';
          box.style.zIndex = 999999;
          box.style.borderRadius = '8px';
          box.style.whiteSpace = 'pre-wrap';
          box.style.display = 'none';
          document.body.appendChild(box);
        }
        return box;
      }
      function show(msg) {
        var box = ensureBox();
        box.style.display = 'block';
        box.textContent += (box.textContent ? "\n\n" : "") + msg;
      }
      window.addEventListener('error', function (e) {
        show("JS Error: " + (e && e.message ? e.message : "Unknown") + (e && e.filename ? "\n" + e.filename + ":" + e.lineno + ":" + e.colno : ""));
      });
      window.addEventListener('unhandledrejection', function (e) {
        show("Promise Rejection: " + (e && e.reason ? (e.reason.stack || e.reason) : "Unknown"));
      });
    })();
  </script>
